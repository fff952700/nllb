server:
  host: 0.0.0.0
  port: 8000

mode: cpu

runtime:
  device: cpu
  omp_threads: 2
  mkl_threads: 2

redis:
  host: 127.0.0.1
  port: 6379
  db: 0
  password: "123456"
  max_connections: 50

stream:
  name: translate_stream
  group: translate_group
  consumer_prefix: worker

worker:
  pool_size: 2
  batch_size: 64
  batch_wait_ms: 50
  max_retry: 3

model:
  name: facebook/nllb-200-distilled-600M
  ct2_path: /data/nllb/models/nllb-600m-ct2
  max_length: 128

hf:
  token: "xxx"
  cache_dir: /data/nllb/cache

cache:
  expire: 86400

auth:
  enabled: false

rate_limit:
  enabled: false
  limit: 1000

gpu:
  max_tokens: 3072
  min_batch: 32
  max_batch: 48
  stash_max_age_ms: 5000
